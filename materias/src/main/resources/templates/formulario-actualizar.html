<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Actualizar Materia</title>
</head>
<body>
<h1>Nueva Materia</h1>
<form th:action="@{/materias/actualizar}" th:object="${materia}" method="post">
    <input type="hidden" th:field="*{id}">
    <label>Nombre materia: </label>
    <br>
    <input th:field="*{nombre}"  required type="text">
    <br>
    <label>Créditos: </label>
    <br>
    <input type="number" th:field="*{creditos}">
    <br>
    <input type="submit" value="Actualizar">
    <a th:href="@{/materias}">Cancelar</a>
</form>
</body>
</html>
